[package]
name = "bls-blueprint"
version = "0.1.1"
description = "A BLS Blueprint that can run keygen and signing jobs on demand from the Tangle network"
edition = "2021"

[package.metadata.blueprint]
manager = { Evm = "BlsBlueprint" }

[dependencies]
gadget-sdk = { git = "https://github.com/tangle-network/gadget/", features = [
    "std",
], rev = "e87eee1f5eaaeaa1d30f11ce71a8a4bcf0d661b9" }

# my_crate = { git = "https://github.com/example/my_crate.git", rev = "abc123def4567890" }
# gadget-sdk = { version = "0.6.1", features = ["std"] }
color-eyre = { version = "0.6", features = ["tracing-error", "color-spantrace"] }
tokio = { version = "1.40", default-features = false, features = ["full"] }
hex = { version = "0.4.3", default-features = false }
k256 = { version = "0.13.3", default-features = false }
bincode = "1.3.3"
sp-core = { version = "31.0.0", default-features = false }
rand_chacha = "0.3.1"
serde = { version = "1.0.214", features = ["derive"] }
round-based = { version = "0.3.2", features = ["runtime-tokio"] }
tracing-subscriber = "0.3.18"
thiserror = "2.0.3"
itertools = "0.13.0"

# MPC specific deps
bls12_381_plus = { version = "0.8.18", features = ["ark", "expose-fields"] }
snowbridge-milagro-bls = "1.5.4"
gennaro-dkg = { version = "0.8.0", features = ["curve25519"] }

# batch threshold deps
batch-threshold = { git = "https://github.com/guruvamsi-policharla/batched-threshold-pp" }
ark-poly = { version = "0.5.0", default-features = false }
ark-ff = { version = "0.5.0", default-features = false }
ark-ec = { version = "0.5.0", default-features = false }
ark-std = { version = "0.5.0", default-features = false, features = ["print-trace", "std"] }
ark-serialize = { version = "0.5.0", default-features = false, features = ["derive"] }
ark-bls12-381 = { version = "0.5.0", default-features = false, features = ["curve"] }

ff = { version = "0.13" }
group = { version = "0.13" }
num-bigint = { version = "0.4" }
sha3 = { version = "0.10.8" }

[build-dependencies]
blueprint-metadata = { git = "https://github.com/tangle-network/gadget/" }

[dev-dependencies]
blueprint-test-utils = { git = "https://github.com/tangle-network/gadget/" }
cargo-tangle = { git = "https://github.com/tangle-network/gadget/" }
#alloy-primitives = "0.7.2"

[features]
default = ["std"]
std = []
